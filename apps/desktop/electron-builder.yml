appId: com.kaemnur.kaemform
productName: KaemForm Desktop
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/icon.png
    to: kaemform.png
asarUnpack:
  - node_modules/better-sqlite3/**/*
win:
  executableName: KaemForm
  icon: icon.png
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
protocols:
  - name: KaemForm
    schemes:
      - kaemform
